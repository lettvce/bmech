<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lettvce</title>
<meta name="description" content="Lettvce — independent software projects.">
<style>
  :root {
    --bg: #16181d;
    --panel: #1e2128;
    --text: #e8e8e8;
    --muted: #9aa0aa;
    --accent: #6fb1ff;
    --border: #2c3038;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    line-height: 1.6;
  }
  header {
    padding: 4rem 1.5rem 3rem;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-size: 2.4rem;
    margin: 0 0 0.5rem;
  }
  header p {
    color: var(--muted);
    max-width: 560px;
    margin: 0 auto;
    font-size: 1.05rem;
  }
  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 3rem 1.5rem;
  }
  section {
    margin-bottom: 3rem;
  }
  h2 {
    font-size: 1.4rem;
    border-left: 3px solid var(--accent);
    padding-left: 0.75rem;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1rem;
    margin-top: 1.5rem;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.2rem;
    text-decoration: none;
    display: block;
    transition: border-color 0.15s ease;
  }
  .card:hover {
    border-color: var(--accent);
  }
  .card h3 {
    margin: 0 0 0.4rem;
    font-size: 1.05rem;
    color: var(--accent);
  }
  .card p {
    margin: 0;
    color: var(--muted);
    font-size: 0.92rem;
  }
  footer {
    border-top: 1px solid var(--border);
    text-align: center;
    padding: 2rem 1.5rem;
    color: var(--muted);
    font-size: 0.9rem;
  }
  footer a { color: var(--muted); }
</style>
</head>
<body>

<header>
  <h1>Lettvce</h1>
  <p>Independent software projects.</p>
</header>

<main>

<section>
  <h2>Projects</h2>
  <div class="grid">
    <a class="card" href="/bmech/">
      <h3>bmech</h3>
      <p>A free, open-source Blender extension for generating mechanical parts —
         gears, springs, ratchets, bearings, and fasteners.</p>
    </a>
  </div>
</section>

</main>

<footer>
  <p>Contact: <a href="mailto:blakewysocki421@gmail.com">blakewysocki421@gmail.com</a></p>
</footer>

</body>
</html>
