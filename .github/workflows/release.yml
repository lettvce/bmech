name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Zip addon
        run: zip -r mechanisms_core.zip mechanisms_core -x '*__pycache__*' -x '*.pyc'

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: mechanisms_core.zip
          generate_release_notes: true
